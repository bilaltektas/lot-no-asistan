
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yapay Zeka Destekli Lot Takip Uygulaması</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  margin:0;
  font-family: Inter;
  background: radial-gradient(circle at top, #0b0f1a, #020617);
  color:#fff;
}

.header {
  text-align:center;
  padding:20px;
  font-size:22px;
  font-weight:700;
  background: linear-gradient(90deg,#38bdf8,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.searchWrap {
  padding:20px;
}

.searchBox {
  position:relative;
}

input {
  width:100%;
  padding:18px 20px;
  border-radius:18px;
  border:none;
  outline:none;
  font-size:17px;
  color:#fff;
  background: linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.grid { padding:10px; }

.card {
  margin:14px;
  padding:20px;
  border-radius:22px;
  background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
  backdrop-filter: blur(20px);
  box-shadow: 0 15px 50px rgba(0,0,0,0.6);
}

.title {
  font-size:18px;
  font-weight:700;
  color:#38bdf8;
}

.sectionTitle {
  margin-top:15px;
  font-size:13px;
  opacity:0.7;
}

.relationWrap {
  margin-top:10px;
  position:relative;
}

.relationRow {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:18px 0;
  position:relative;
}

.lotBox {
  width:40%;
  padding:12px;
  text-align:center;
  border-radius:14px;
  background: linear-gradient(135deg,#1e3a8a,#0ea5e9);
  transition:0.3s;
}

.lotBox:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #38bdf8;
}

.line {
  position:absolute;
  left:30%;
  right:30%;
  height:2px;
  background: linear-gradient(90deg,#38bdf8,#a78bfa);
  animation: flow 2s linear infinite;
}

@keyframes flow {
  0% {background-position:0%}
  100% {background-position:100%}
}

.total {
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  text-align:center;
  background: linear-gradient(90deg,#22d3ee,#6366f1);
  font-weight:600;
}

.meta {
  font-size:13px;
  opacity:0.8;
  margin-top:6px;
}

</style>
</head>
<body>

<div class="header">Yapay Zeka Destekli Lot Takip Asistanı</div>

<div class="searchWrap">
  <div class="searchBox">
    <input id="search" placeholder="Lot gir (Sanita / Tedarikçi)" oninput="search()">
  </div>
</div>

<div id="result" class="grid"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTq_K0MzfNE9D-UaSpJ_CUF9pZIgMSp0FWj76vtXMTNv7fx0GndMw3yyAW9J58ke30KY722ixFQKWgr/pub?output=csv";
let data = [];

function normalize(row){
  const obj = {};
  for (let k in row){
    obj[k.trim().toUpperCase()] = row[k];
  }
  return obj;
}

Papa.parse(url, {
  download:true,
  header:true,
  complete:(res)=>{
    data = res.data.map(normalize);
  }
});

function parseKg(val){
  return parseFloat((val||"").replace("KG","").trim()) || 0;
}

function search(){
  const val = document.getElementById("search").value.toUpperCase().trim();
  const out = document.getElementById("result");
  out.innerHTML = "";
  if(!val) return;

  const filtered = data.filter(r =>
    (r["SANİTA LOT NO"]||"").toUpperCase() === val ||
    (r["TEDARİKÇİ LOT"]||"").toUpperCase() === val
  );

  const grouped = {};

  filtered.forEach(r => {
    const key = r["TEDARİKÇİ LOT"];
    if(!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });

  Object.keys(grouped).forEach(lot => {

    const items = grouped[lot];
    const first = items[0];

    let totalKg = items.reduce((sum,i)=> sum + parseKg(i["MİKTAR"]),0);

    const card = document.createElement("div");
    card.className = "card";

    let relations = items.map(i => `
      <div class="relationRow">
        <div class="lotBox">${i["TEDARİKÇİ LOT"]}<br><small>Tedarikçi Lot</small></div>
        <div class="line"></div>
        <div class="lotBox">${i["SANİTA LOT NO"]}<br><small>Sanita Lot</small></div>
      </div>
    `).join("");

    card.innerHTML = `
      <div class="title">${first["TEDARİKÇİ"]}</div>

      <div class="meta">📅 ${first["GELİŞ TARİHİ"]}</div>
      <div class="meta">📦 ${first["STOK ADI"]}</div>
      <div class="meta">📄 ${first["İRSALİYE NO"]}</div>
      <div class="meta">🚛 ${first["PLAKA"]}</div>

      <div class="total">TOPLAM: ${totalKg} KG</div>

      <div class="sectionTitle">EŞLEŞMELER</div>

      <div class="relationWrap">
        ${relations}
      </div>
    `;

    out.appendChild(card);
  });
}

</script>

</body>
</html>
