<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lot Trace Enterprise</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>

<style>
body{margin:0;font-family:Inter;background:#0b0f1a;color:#fff}
.header{text-align:center;padding:15px;font-weight:700}
.panel{padding:10px;display:flex;gap:10px;flex-wrap:wrap}
input,select{padding:10px;border-radius:10px;border:none}
#cy{width:100%;height:60vh;background:#020617}
button{padding:10px;border:none;border-radius:10px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center}
.modalBox{background:#111;padding:20px;border-radius:12px;width:90%;max-width:400px}
@media print{
 body{background:#fff;color:#000}
 #cy{display:none}
}
</style>
</head>
<body>

<div class="header">Yapay Zeka Destekli Lot No Asistanı</div>

<div class="panel">
<input id="search" placeholder="Lot ara">
<select id="firma"></select>
<input type="text" id="urun" placeholder="Ürün ara">
<input type="date" id="tarih">
<button onclick="run()">ARA</button>
<button onclick="window.print()">YAZDIR</button>
<button onclick="exportPDF()">PDF</button>
</div>

<div id="cy"></div>

<div class="modal" id="modal">
 <div class="modalBox" id="modalContent"></div>
</div>

<script>
const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vTq_K0MzfNE9D-UaSpJ_CUF9pZIgMSp0FWj76vtXMTNv7fx0GndMw3yyAW9J58ke30KY722ixFQKWgr/pub?output=csv";
let data=[];

Papa.parse(url,{download:true,header:true,complete:r=>{
 data=r.data;
 initFilters();
}});

function initFilters(){
 const firms=[...new Set(data.map(d=>d["TEDARİKÇİ"]))];
 const sel=document.getElementById("firma");
 sel.innerHTML='<option value="">Firma</option>';
 firms.forEach(f=>{
  const o=document.createElement("option");
  o.textContent=f; sel.appendChild(o);
 });
}

function run(){
 const lot=document.getElementById("search").value.toUpperCase();
 const firma=document.getElementById("firma").value;
 const urun=document.getElementById("urun").value.toUpperCase();

 const filtered=data.filter(d=>
  (!lot || d["SANİTA LOT NO"]==lot || d["TEDARİKÇİ LOT"]==lot) &&
  (!firma || d["TEDARİKÇİ"]==firma) &&
  (!urun || (d["STOK ADI"]||"").toUpperCase().includes(urun))
 );

 let elements=[];

 filtered.forEach(d=>{
  elements.push({data:{id:d["TEDARİKÇİ LOT"],label:d["TEDARİKÇİ LOT"]}});
  elements.push({data:{id:d["SANİTA LOT NO"],label:d["SANİTA LOT NO"]}});
  elements.push({data:{source:d["TEDARİKÇİ LOT"],target:d["SANİTA LOT NO"],info:JSON.stringify(d)}});
 });

 const cy=cytoscape({
  container:document.getElementById('cy'),
  elements:elements,
  style:[
    {selector:'node',style:{'background-color':'#38bdf8','label':'data(label)','color':'#fff'}},
    {selector:'edge',style:{'line-color':'#a78bfa','width':2}}
  ],
  layout:{name:'cose'}
 });

 cy.on('tap','edge',evt=>{
  const info=JSON.parse(evt.target.data('info'));
  showModal(info);
 });
}

function showModal(d){
 const m=document.getElementById("modal");
 const c=document.getElementById("modalContent");
 c.innerHTML=`
  <h3>${d["TEDARİKÇİ"]}</h3>
  <p>📦 ${d["STOK ADI"]}</p>
  <p>⚖️ ${d["MİKTAR"]}</p>
  <p>📅 ${d["GELİŞ TARİHİ"]}</p>
  <p>📄 ${d["İRSALİYE NO"]}</p>
 `;
 m.style.display="flex";
 m.onclick=()=>m.style.display="none";
}

function exportPDF(){
 window.print();
}

</script>

</body>
</html>
