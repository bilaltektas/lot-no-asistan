<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lot Tracking Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body {
  margin:0;
  font-family: Inter;
  background: radial-gradient(circle at top, #1a1f2e, #0b0f1a);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
.header {
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:700;
}

/* SEARCH */
.search {
  padding:15px;
}

input {
  width:100%;
  padding:15px;
  border-radius:15px;
  border:none;
  outline:none;
  font-size:16px;
  background: rgba(255,255,255,0.08);
  color:white;
  backdrop-filter: blur(10px);
}

/* CARD */
.card {
  margin:15px;
  padding:18px;
  border-radius:18px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transform: translateY(20px);
  opacity:0;
  animation: fadeUp 0.4s forwards;
}

@keyframes fadeUp {
  to {
    transform: translateY(0);
    opacity:1;
  }
}

.title {
  font-weight:700;
  font-size:18px;
}

.meta {
  margin-top:8px;
  font-size:14px;
  opacity:0.85;
}

.badge {
  display:inline-block;
  padding:5px 10px;
  border-radius:10px;
  background: rgba(0,200,255,0.2);
  margin-top:10px;
  font-size:12px;
}

</style>
</head>

<body>

<div class="header">📦 LOT TRACKING DASHBOARD</div>

<div class="search">
<input id="search" placeholder="Lot gir (SP26-007 / SC/25-680)" oninput="searchData()">
</div>

<div id="result"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTq_K0MzfNE9D-UaSpJ_CUF9pZIgMSp0FWj76vtXMTNv7fx0GndMw3yyAW9J58ke30KY722ixFQKWgr/pub?output=csv";

let data = [];

Papa.parse(url, {
  download: true,
  header: true,
  complete: function(results) {
    data = results.data;
  }
});

function searchData() {

  const val = document.getElementById("search").value.toUpperCase();
  const res = document.getElementById("result");
  res.innerHTML = "";

  if (!val) return;

  const filtered = data.filter(r =>
    (r["SANİTA LOT NO"] || "").toUpperCase() === val ||
    (r["TEDARİKÇİ LOT"] || "").toUpperCase() === val
  );

  filtered.forEach(r => {

    const isSanita = (r["SANİTA LOT NO"] || "").toUpperCase() === val;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${r["TEDARİKÇİ"]}</div>

      <div class="meta">
        📅 ${r["GELİŞ TARİHİ"]} <br>
        📦 ${r["STOK ADI"]} <br>
        ⚖️ ${r["MİKTAR"]}
      </div>

      <div class="badge">
        ${r["KULLANILACAK FİRMA"]}
      </div>

      <div class="meta">
        ${isSanita
          ? "🔁 Tedarikçi Lot: " + r["TEDARİKÇİ LOT"]
          : "🔁 Sanita Lot: " + r["SANİTA LOT NO"]}
      </div>

      <div class="meta">🚚 İrsaliye: ${r["İRSALİYE NO"]}</div>
      <div class="meta">🚛 Plaka: ${r["PLAKA"]}</div>
    `;

    res.appendChild(div);
  });
}

</script>

</body>
</html>
